function cosine(a, b) {
  let dot = 0, na = 0, nb = 0;
  for (let i = 0; i < a.length; i++) { dot += a[i]*b[i]; na += a[i]*a[i]; nb += b[i]*b[i]; }
  return dot / (Math.sqrt(na) * Math.sqrt(nb) + 1e-9);
}
function compresser(v) { return v.map(x => 0.5 + (x - 0.5) * 0.75); }

function simulate() {
  const cities = Object.keys(VILLES);
  const N = 30000;
  const distOptions = ["proche","europe","monde"];
  const cadreOptions = ["patrimoine","nature","urbain"];
  const combos = [];
  for (const d of distOptions) for (const c of cadreOptions) combos.push({dist:d, cadre:c});

  const bucketSizes = {};
  const bucketCities = {};
  for (const combo of combos) {
    const key = combo.dist + "|" + combo.cadre;
    bucketSizes[key] = 0;
    bucketCities[key] = [];
  }
  cities.forEach(c => {
    const t = CITY_TAGS[c];
    const key = t.dist + "|" + t.cadre;
    bucketSizes[key]++;
    bucketCities[key].push(c);
  });

  const top3countGlobal = {};
  cities.forEach(c => { top3countGlobal[c] = 0; });

  const rng = (seed) => { let s = seed; return () => { s = (s * 1664525 + 1013904223) & 0x7fffffff; return s / 0x7fffffff; }; };
  const rand = rng(42);

  // Global ranking (no filter)
  for (let t = 0; t < N; t++) {
    const userVec = AXES.map(() => rand());
    const u = compresser(userVec);
    const ranked = cities.map(c => ({city: c, score: cosine(u, compresser(VILLES[c]))}))
      .sort((a, b) => b.score - a.score);
    for (let i = 0; i < 3; i++) top3countGlobal[ranked[i].city]++;
  }

  // Per-couloir: hard filter simulation
  const comboTrials = {};
  const comboTop3Count = {};
  for (const combo of combos) {
    const key = combo.dist + "|" + combo.cadre;
    comboTrials[key] = N;
    comboTop3Count[key] = {};
  }

  for (let t = 0; t < N; t++) {
    const userVec = AXES.map(() => rand());
    const u = compresser(userVec);

    for (const combo of combos) {
      const key = combo.dist + "|" + combo.cadre;
      const pool = bucketCities[key];
      if (pool.length === 0) continue;

      const ranked = pool.map(c => ({city: c, score: cosine(u, compresser(VILLES[c]))}))
        .sort((a, b) => b.score - a.score);

      const top = Math.min(3, ranked.length);
      for (let i = 0; i < top; i++) {
        const c = ranked[i].city;
        comboTop3Count[key][c] = (comboTop3Count[key][c] || 0) + 1;
      }
    }
  }

  const results = cities.map(city => {
    const tags = CITY_TAGS[city];
    const key = tags.dist + "|" + tags.cadre;
    const trials = comboTrials[key];
    const hits = comboTop3Count[key][city] || 0;
    const pctMatch = trials > 0 ? (hits / trials * 100) : 0;
    const pctGlobal = top3countGlobal[city] / N * 100;
    const bucketSize = bucketSizes[key];
    return { city, tags, scores: VILLES[city], pctMatch, pctGlobal, bucketSize, bucketKey: key };
  });

  return { results, bucketSizes };
}

let allResults = [];
let bucketSizes = {};

function render() {
  const filterDist = document.getElementById("filter-dist").value;
  const filterCadre = document.getElementById("filter-cadre").value;
  const sortBy = document.getElementById("sort-by").value;

  let data = allResults.filter(r => {
    if (filterDist !== "all" && r.tags.dist !== filterDist) return false;
    if (filterCadre !== "all" && r.tags.cadre !== filterCadre) return false;
    return true;
  });

  if (sortBy === "pct_match") data.sort((a, b) => b.pctMatch - a.pctMatch);
  else if (sortBy === "pct_global") data.sort((a, b) => b.pctGlobal - a.pctGlobal);
  else data.sort((a, b) => a.city.localeCompare(b.city));

  const maxMatch = Math.max(...data.map(d => d.pctMatch), 1);
  const maxGlobal = Math.max(...data.map(d => d.pctGlobal), 1);

  // Summary stats
  const pcts = data.map(d => d.pctMatch);
  const avg = pcts.reduce((a,b)=>a+b,0)/pcts.length;
  const min = Math.min(...pcts);
  const max = Math.max(...pcts);
  const ratio = min > 0 ? (max / min).toFixed(1) : "∞";
  const zeroCount = pcts.filter(p => p === 0).length;
  const ratioClass = (max/min) < 3 ? "good" : (max/min) < 6 ? "warn" : "bad";
  const zeroClass = zeroCount === 0 ? "good" : "bad";

  document.getElementById("summary").innerHTML = `
    <div class="summary-item"><span class="label">Villes affichees</span><span class="value">${data.length}</span></div>
    <div class="summary-item"><span class="label">% moyen (couloir)</span><span class="value">${avg.toFixed(1)}%</span></div>
    <div class="summary-item"><span class="label">Min</span><span class="value ${min < 5 ? 'warn' : 'good'}">${min.toFixed(1)}%</span></div>
    <div class="summary-item"><span class="label">Max</span><span class="value">${max.toFixed(1)}%</span></div>
    <div class="summary-item"><span class="label">Ratio max/min</span><span class="value ${ratioClass}">${ratio}x</span></div>
    <div class="summary-item"><span class="label">Villes a 0%</span><span class="value ${zeroClass}">${zeroCount}</span></div>
  `;

  const tbody = document.getElementById("tbody");
  tbody.innerHTML = data.map((r, i) => {
    const axesMini = AXES.map((a, j) => {
      const h = Math.round(r.scores[j] * 18);
      return `<div style="height:${h}px;background:${AXIS_COLORS[a]}" title="${AXES_SHORT[a]}: ${r.scores[j]}"></div>`;
    }).join("");

    const barMatch = Math.round(r.pctMatch / maxMatch * 100);
    const barGlobal = Math.round(r.pctGlobal / maxGlobal * 100);
    const idealPct = 3 / r.bucketSize * 100;
    const colorMatch = r.pctMatch >= idealPct * 0.5 ? "#25bec7" : r.pctMatch > 0 ? "#f59e0b" : "#ef4444";
    const colorGlobal = r.pctGlobal > 5 ? "#25bec7" : r.pctGlobal > 1 ? "#f59e0b" : "#ef4444";

    return `<tr>
      <td>${i + 1}</td>
      <td><strong>${r.city}</strong></td>
      <td><span class="tag tag-${r.tags.dist}">${r.tags.dist}</span></td>
      <td><span class="tag tag-${r.tags.cadre}">${r.tags.cadre}</span></td>
      <td style="color:#94a3b8;font-size:0.8rem">${r.bucketSize}</td>
      <td><div class="axes-mini">${axesMini}</div></td>
      <td class="bar-cell"><div class="bar-bg"><div class="bar-fill" style="width:${barMatch}%;background:${colorMatch}"></div><span class="bar-label">${r.pctMatch.toFixed(1)}%</span></div></td>
      <td class="bar-cell"><div class="bar-bg"><div class="bar-fill" style="width:${barGlobal}%;background:${colorGlobal}"></div><span class="bar-label">${r.pctGlobal.toFixed(1)}%</span></div></td>
    </tr>`;
  }).join("");

  document.getElementById("status").textContent =
    `${data.length} villes affichees — simulation : 30 000 profils × 9 couloirs (hard filter)`;
}

// Legend
document.getElementById("legend").innerHTML = AXES.map(a =>
  `<span><span class="legend-dot" style="background:${AXIS_COLORS[a]}"></span>${AXES_SHORT[a]}</span>`
).join("");

// Run simulation
setTimeout(() => {
  const sim = simulate();
  allResults = sim.results;
  bucketSizes = sim.bucketSizes;
  render();
}, 50);

document.getElementById("filter-dist").addEventListener("change", render);
document.getElementById("filter-cadre").addEventListener("change", render);
document.getElementById("sort-by").addEventListener("change", render);
</script>
</body>
</html>
