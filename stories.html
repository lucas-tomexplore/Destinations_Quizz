<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TomExplore — Quiz Stories</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #1e293b;
  --text2: #64748b;
  --accent: #25bec7;
  --accent-soft: rgba(37,190,199,0.10);
  --green: #10b981;
  --red: #ef4444;
  --orange: #f59e0b;
  --border: #e2e8f0;
  --navy: #1e293b;
  --radius: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Montserrat', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.header {
  display: flex; align-items: center; justify-content: center;
  padding: 14px 20px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.header h1 { font-size: 1.1rem; font-weight: 800; }
.header h1 span { color: var(--accent); }

/* ─── Story bubbles ─── */
.stories-row {
  display: flex; gap: 16px; padding: 20px 20px 10px;
  overflow-x: auto; max-width: 600px; margin: 0 auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.stories-row::-webkit-scrollbar { display: none; }
.story-bubble {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  cursor: pointer; flex-shrink: 0; width: 76px;
}
.story-ring {
  width: 68px; height: 68px; border-radius: 50%;
  padding: 3px;
  background: conic-gradient(var(--accent), #0ea5e9, var(--accent));
  transition: transform 0.2s;
}
.story-ring.played {
  background: conic-gradient(var(--green), #4ade80, var(--green));
}
.story-ring.completed {
  background: conic-gradient(#f59e0b, #fbbf24, #f59e0b);
}
.story-bubble:hover .story-ring { transform: scale(1.08); }
.story-avatar {
  width: 100%; height: 100%; border-radius: 50%;
  background: var(--card); border: 2px solid var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem;
}
.story-name {
  font-size: 0.65rem; font-weight: 700; color: var(--text2);
  text-align: center; line-height: 1.2;
  max-width: 76px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* ─── Container ─── */
.container { max-width: 600px; margin: 0 auto; padding: 0 20px 24px; }
.section-title { font-size: 0.8rem; color: var(--text2); text-transform: uppercase; font-weight: 700; margin: 16px 0 12px; letter-spacing: 0.5px; }

.empty-state { text-align: center; padding: 80px 24px; }
.empty-state .icon { font-size: 4rem; margin-bottom: 16px; }
.empty-state h2 { font-size: 1.3rem; margin-bottom: 8px; }
.empty-state p { color: var(--text2); max-width: 400px; margin: 0 auto 24px; }
.empty-state a {
  display: inline-block; background: var(--accent); color: #fff;
  padding: 12px 28px; border-radius: 99px; text-decoration: none;
  font-weight: 700;
}

/* ─── Quiz screen ─── */
.quiz-screen { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
.quiz-back {
  background: none; border: none; color: var(--text2); cursor: pointer;
  font-size: 0.9rem; font-family: inherit; margin-bottom: 16px;
  display: flex; align-items: center; gap: 6px;
}
.diff-bar {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px; padding: 10px 16px;
  background: var(--card); border-radius: 12px; border: 1px solid var(--border);
}
.diff-label { font-size: 0.72rem; color: var(--text2); font-weight: 600; text-transform: uppercase; white-space: nowrap; }
.diff-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; }
.diff-fill { height: 100%; border-radius: 3px; transition: width .5s, background .5s; }
.diff-text { font-size: 0.8rem; font-weight: 700; min-width: 60px; text-align: right; }

.quiz-progress {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 14px; font-size: 0.85rem; color: var(--text2);
}
.quiz-prog-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; }
.quiz-prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s; }

.quiz-score {
  display: flex; align-items: center; justify-content: center; gap: 20px;
  margin-bottom: 14px;
}
.score-item { text-align: center; }
.score-item .num { font-size: 1.4rem; font-weight: 800; }
.score-item .lbl { font-size: 0.68rem; color: var(--text2); text-transform: uppercase; }

/* ─── Question card ─── */
.q-card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 22px;
  margin-bottom: 14px; animation: fadeIn .3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.q-city-tag {
  display: inline-block; background: var(--accent);
  color: #fff; padding: 3px 12px; border-radius: 99px;
  font-size: 0.72rem; font-weight: 700; margin-bottom: 10px;
}
.q-diff-tag {
  display: inline-block; padding: 3px 10px; border-radius: 99px;
  font-size: 0.68rem; font-weight: 700; margin-left: 6px;
}
.diff-easy { background: #dcfce7; color: #166534; }
.diff-med { background: #fef3c7; color: #92400e; }
.diff-hard { background: #fee2e2; color: #991b1b; }
.q-text { font-size: 1.05rem; font-weight: 700; margin-bottom: 18px; line-height: 1.4; }

.answers { display: flex; flex-direction: column; gap: 9px; }
.ans-btn {
  background: var(--card); border: 2px solid var(--border);
  border-radius: 12px; padding: 13px 15px;
  font-family: inherit; font-size: 0.92rem;
  cursor: pointer; text-align: left; transition: all .2s;
  color: var(--text);
}
.ans-btn:hover { border-color: var(--accent); background: var(--accent-soft); }
.ans-btn.correct { border-color: var(--green); background: rgba(16,185,129,0.1); }
.ans-btn.wrong { border-color: var(--red); background: rgba(239,68,68,0.1); }
.ans-btn.reveal { border-color: var(--green); background: rgba(16,185,129,0.06); }
.ans-btn.hint-out { opacity: 0.3; pointer-events: none; text-decoration: line-through; }

/* ─── Image answers ─── */
.answers-img { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
.ans-img {
  position: relative; border-radius: 14px; overflow: hidden;
  border: 3px solid var(--border); cursor: pointer; transition: all .25s;
}
.ans-img:hover { border-color: var(--accent); transform: scale(1.02); }
.ans-img img { width: 100%; height: 130px; object-fit: cover; display: block; }
.ans-img .img-label {
  position: absolute; top: 8px; left: 8px; width: 28px; height: 28px; border-radius: 50%;
  background: rgba(0,0,0,0.6); color: #fff; font-weight: 800; font-size: 0.8rem;
  display: flex; align-items: center; justify-content: center; z-index: 2;
}
.ans-img .img-icon {
  display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem;
  align-items: center; justify-content: center; z-index: 3;
}
.ans-img.correct { border-color: var(--green) !important; border-width: 4px; }
.ans-img.correct .img-label { background: var(--green); }
.ans-img.correct .img-icon { display: flex; background: var(--green); color: #fff; }
.ans-img.wrong { border-color: var(--red) !important; border-width: 4px; }
.ans-img.wrong .img-label { background: var(--red); }
.ans-img.wrong .img-icon { display: flex; background: var(--red); color: #fff; }
.ans-img.reveal { border-color: var(--green) !important; }
.ans-img.reveal .img-icon { display: flex; background: var(--green); color: #fff; }
.ans-img.dimmed { opacity: 0.35; }
.ans-img.hint-out { opacity: 0.15; pointer-events: none; filter: grayscale(1); }

/* ─── Hint + anecdote ─── */
.hint-btn {
  display: block; margin: 12px auto 0; padding: 8px 20px; border-radius: 99px;
  border: 2px solid var(--accent); background: transparent; color: var(--accent);
  font-family: inherit; font-weight: 600; font-size: 0.8rem; cursor: pointer;
  transition: all .2s;
}
.hint-btn:hover { background: var(--accent-soft); }
.anecdote {
  background: var(--accent-soft); border-left: 3px solid var(--accent);
  border-radius: 0 12px 12px 0; padding: 13px 15px;
  margin-top: 14px; font-size: 0.85rem; line-height: 1.5;
  animation: fadeIn .4s;
}
.anecdote strong { color: var(--accent); }
.next-btn {
  display: block; margin: 12px auto 0; background: var(--accent); color: #fff;
  border: none; border-radius: 99px; padding: 10px 26px;
  font-family: inherit; font-weight: 700; font-size: 0.88rem; cursor: pointer;
}

/* ─── Results ─── */
.results-screen { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
.results-card {
  background: var(--card); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 28px 22px; text-align: center;
  animation: fadeIn .4s;
}
.results-card .emoji { font-size: 3.5rem; margin-bottom: 10px; }
.results-card .title { font-size: 1.3rem; font-weight: 800; margin-bottom: 4px; }
.results-card .sub { color: var(--text2); margin-bottom: 20px; font-size: 0.9rem; }
.stats-row { display: flex; justify-content: center; gap: 22px; margin-bottom: 20px; }
.stat { text-align: center; }
.stat .val { font-size: 1.8rem; font-weight: 800; }
.stat .lbl { font-size: 0.7rem; color: var(--text2); text-transform: uppercase; }
.bk-row {
  display: flex; align-items: center; gap: 10px; padding: 8px 0;
  border-bottom: 1px solid var(--border); text-align: left;
}
.bk-row:last-child { border: none; }
.bk-city { font-weight: 700; min-width: 90px; font-size: 0.85rem; }
.bk-bar { flex: 1; height: 8px; background: var(--border); border-radius: 4px; }
.bk-fill { height: 100%; border-radius: 4px; }
.bk-val { font-size: 0.82rem; font-weight: 700; min-width: 42px; text-align: right; }
.results-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
.results-btns button {
  background: var(--accent); color: #fff; border: none;
  border-radius: 99px; padding: 11px 22px;
  font-family: inherit; font-weight: 700; font-size: 0.88rem; cursor: pointer;
}
.results-btns .sec { background: transparent; color: var(--accent); border: 2px solid var(--accent); }

@media (max-width: 480px) {
  .quiz-screen, .results-screen { padding: 12px; }
  .q-text { font-size: 0.98rem; }
}
</style>
</head>
<body>
<div class="header">
  <h1><span>Tom</span>Explore — Quiz Stories</h1>
</div>

<div id="empty-state" class="empty-state" style="display:none">
  <div class="icon">🧭</div>
  <h2>Pas encore de resultats</h2>
  <p>Fais d'abord le quiz de destination pour decouvrir tes villes, puis reviens ici !</p>
  <a href="index.html">Faire le quiz →</a>
</div>

<div id="stories-home" style="display:none">
  <div class="stories-row" id="bubble-row"></div>
  <div class="container">
    <p class="section-title">Tes destinations</p>
    <p style="color:var(--text2);font-size:0.85rem">Clique sur une ville pour lancer son quiz culturel</p>
  </div>
</div>

<div id="quiz-screen" class="quiz-screen">
  <button class="quiz-back" onclick="backHome()">← Retour</button>
  <div class="diff-bar">
    <span class="diff-label">Niveau</span>
    <div class="diff-track"><div id="diff-fill" class="diff-fill"></div></div>
    <span id="diff-text" class="diff-text"></span>
  </div>
  <div class="quiz-progress">
    <span id="q-counter">1/5</span>
    <div class="quiz-prog-bar"><div id="q-prog-fill" class="quiz-prog-fill"></div></div>
  </div>
  <div class="quiz-score">
    <div class="score-item"><div class="num" id="s-correct" style="color:var(--green)">0</div><div class="lbl">Correct</div></div>
    <div class="score-item"><div class="num" id="s-total">0</div><div class="lbl">Questions</div></div>
    <div class="score-item"><div class="num" id="s-streak" style="color:var(--orange)">0</div><div class="lbl">Serie</div></div>
  </div>
  <div id="q-area"></div>
</div>

<div id="results-screen" class="results-screen"></div>

<script src="quiz-data.js"></script>
<script>
var CITY_EMOJIS = {"Amsterdam":"🌷","Athenes":"🏛️","Bali":"🌺","Bangkok":"🛕","Barcelone":"🎭","Berlin":"🐻","Biarritz":"🏄","Bogota":"☕","Bordeaux":"🍷","Bucarest":"🏰","Budapest":"♨️","Buenos Aires":"💃","Cancun":"🏖️","Cartagena":"🏰","Chicago":"🏙️","Cinque Terre":"🌈","Copenhague":"🧜","Cracovie":"🏰","Cuzco":"🦙","Dubrovnik":"⛵","Dubai":"🏙️","Edimbourg":"🏰","Fes":"🕌","Florence":"🎨","Hanoi":"🍜","Helsinki":"❄️","Ho Chi Minh":"🛵","Hong Kong":"🌃","Istanbul":"🕌","Kyoto":"⛩️","La Havane":"🚗","Le Cap":"🦁","Le Caire":"🔺","Lima":"🥘","Lisbonne":"🚋","Ljubljana":"🐉","Londres":"🎡","Lucerne":"⛰️","Lyon":"🍴","Madrid":"☀️","Malaga":"🏖️","Marrakech":"🌅","Medelin":"🌸","Mexico":"🌮","Montreal":"🍁","Munich":"🍺","Naples":"🍕","New York":"🗽","Nice":"🌴","Oslo":"❄️","Paris":"🗼","Petra":"🏜️","Prague":"🏰","Phuket":"🏝️","Porto":"🍷","Reykjavik":"🌋","Rio de Janeiro":"🎉","Rome":"🏛️","Rotterdam":"🏗️","San Francisco":"🌉","Santorin":"🌊","Seoul":"🎮","Seville":"💃","Siem Reap":"🛕","Singapour":"🦁","Stockholm":"🚢","Sydney":"🏄","Taipei":"🏯","Tokyo":"🗼","Vannes":"⚓","Venise":"🎭","Vienne":"🎻","Zagreb":"🏰"};

var LEVELS = 9, START = 3, TOTAL = 5;
var LABELS = {1:"Tres facile",2:"Facile",3:"Facile+",4:"Moyen-",5:"Moyen",6:"Moyen+",7:"Difficile-",8:"Difficile",9:"Extreme"};
var COLORS = {1:"#22c55e",2:"#4ade80",3:"#84cc16",4:"#eab308",5:"#f59e0b",6:"#f97316",7:"#ef4444",8:"#dc2626",9:"#991b1b"};
function diffCls(d){return d<=3?'diff-easy':d<=6?'diff-med':'diff-hard';}

var city='', level=START, used=[], cur=null, qIdx=0, score=0, streak=0, maxStrk=0, answered=0, waiting=false, imgCount=0, isImg=false, hintUsed=false;

function pick(){
  if(!CQ[city])return null;
  var c=[];
  CQ[city].forEach(function(q,i){
    if(q.type!=='img'&&q.d===level&&!used.some(function(u){return u===i;}))
      c.push({i:i,q:q,d:q.d});
  });
  if(!c.length){
    for(var off=1;off<LEVELS;off++){
      [level-off,level+off].forEach(function(lv){
        if(lv>=1&&lv<=LEVELS&&!c.length){
          CQ[city].forEach(function(q,i){
            if(q.type!=='img'&&q.d===lv&&!used.some(function(u){return u===i;}))
              c.push({i:i,q:q,d:q.d});
          });
        }
      });
      if(c.length)break;
    }
  }
  return c.length?c[Math.floor(Math.random()*c.length)]:null;
}

function pickImg(){
  if(!CQ[city])return null;
  var c=[];
  CQ[city].forEach(function(q,i){
    if(q.type==='img'&&!used.some(function(u){return u===i;}))
      c.push({i:i,q:q});
  });
  return c.length?c[Math.floor(Math.random()*c.length)]:null;
}

function updateDiff(){
  var f=document.getElementById('diff-fill');
  var t=document.getElementById('diff-text');
  f.style.width=((level-1)/(LEVELS-1)*100)+'%';
  f.style.background=COLORS[level];
  t.textContent=LABELS[level];t.style.color=COLORS[level];
}

function startQuiz(c){
  city=c;level=START;used=[];qIdx=0;score=0;streak=0;maxStrk=0;answered=0;waiting=false;imgCount=0;isImg=false;hintUsed=false;
  document.getElementById('stories-home').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  document.getElementById('results-screen').style.display='none';
  showQ();
}

function showQ(){
  if(qIdx>=TOTAL){showResults();return;}
  var p=null,bonus=false;
  if((qIdx===1||qIdx===3)&&imgCount<2){
    var ip=pickImg();
    if(ip){imgCount++;isImg=true;bonus=true;p=ip;}
  }
  if(!p){p=pick();isImg=false;}
  if(!p){showResults();return;}
  cur=p;used.push(p.i);hintUsed=false;

  if(bonus){
    document.getElementById('q-counter').textContent='Bonus 📷';
  } else {
    document.getElementById('q-counter').textContent=(qIdx+1)+'/'+TOTAL;
    document.getElementById('q-prog-fill').style.width=(qIdx/TOTAL*100)+'%';
  }
  document.getElementById('s-correct').textContent=score;
  document.getElementById('s-total').textContent=answered;
  document.getElementById('s-streak').textContent=streak;
  updateDiff();

  var q=p.q;
  var sh=q.a.map(function(t,i){return{t:t,i:i};});
  for(var i=sh.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=sh[i];sh[i]=sh[j];sh[j]=tmp;}
  var labels=['A','B','C','D'];

  var h='<div class="q-card"><span class="q-city-tag">'+city+'</span>';
  if(bonus){
    h+='<span class="q-diff-tag" style="background:#e0f2fe;color:#0284c7">📷 Photo</span>';
  } else {
    h+='<span class="q-diff-tag '+diffCls(p.d)+'">'+LABELS[p.d]+'</span>';
  }
  h+='<div class="q-text">'+q.q+'</div>';

  if(q.type==='img'){
    h+='<div class="answers-img">';
    sh.forEach(function(o,idx){
      h+='<div class="ans-img" data-o="'+o.i+'" onclick="answer(this,'+o.i+','+q.c+')"><span class="img-label">'+labels[idx]+'</span><span class="img-icon"></span><img src="'+CQ_IMGS[o.t]+'" alt="" loading="lazy"></div>';
    });
    h+='</div><button class="hint-btn" onclick="useHint('+q.c+')">Indice 💡</button>';
  } else {
    h+='<div class="answers">';
    sh.forEach(function(o){
      h+='<button class="ans-btn" data-o="'+o.i+'" onclick="answer(this,'+o.i+','+q.c+')">'+o.t+'</button>';
    });
    h+='</div><button class="hint-btn" onclick="useHint('+q.c+')">Indice 💡</button>';
  }
  h+='<div id="anecdote"></div></div>';
  document.getElementById('q-area').innerHTML=h;
  waiting=false;
}

function useHint(correct){
  var isI=!!document.querySelector('.ans-img');
  var sel=isI?'.ans-img':'.ans-btn';
  var btns=document.querySelectorAll(sel);
  var wrong=[];
  btns.forEach(function(b){if(parseInt(b.dataset.o)!==correct&&!b.classList.contains('hint-out'))wrong.push(b);});
  for(var i=wrong.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=wrong[i];wrong[i]=wrong[j];wrong[j]=tmp;}
  wrong.slice(0,2).forEach(function(b){b.classList.add('hint-out');});
  hintUsed=true;
  var hb=document.querySelector('.hint-btn');
  if(hb)hb.remove();
}

function answer(btn,chosen,correct){
  if(waiting)return;waiting=true;
  var ok=chosen===correct;
  var isI=!!document.querySelector('.ans-img');

  if(isI){
    document.querySelectorAll('.ans-img').forEach(function(b){
      var o=parseInt(b.dataset.o);
      b.style.pointerEvents='none';
      if(b===btn&&ok){b.classList.add('correct');b.querySelector('.img-icon').textContent='✓';}
      else if(b===btn&&!ok){b.classList.add('wrong');b.querySelector('.img-icon').textContent='✗';}
      else if(o===correct){b.classList.add('reveal');b.querySelector('.img-icon').textContent='✓';}
      else{b.classList.add('dimmed');}
    });
  } else {
    document.querySelectorAll('.ans-btn').forEach(function(b){
      if(parseInt(b.dataset.o)===correct)b.classList.add('reveal');
      b.style.pointerEvents='none';
    });
    if(ok){btn.classList.remove('reveal');btn.classList.add('correct');}
    else{btn.classList.add('wrong');}
  }

  if(ok){streak++;if(streak>maxStrk)maxStrk=streak;}
  else{streak=0;}

  if(!isImg){
    if(ok&&!hintUsed){score++;level=Math.min(LEVELS,level+1);}
    else if(ok&&hintUsed){score+=0.5;}
    else{level=Math.max(1,level-1);}
    answered++;
    updateDiff();
    document.getElementById('s-correct').textContent=score;
    document.getElementById('s-total').textContent=answered;
  }
  document.getElementById('s-streak').textContent=streak;

  var hb=document.querySelector('.hint-btn');
  if(hb)hb.remove();

  var em=ok?'✅':'❌';
  document.getElementById('anecdote').innerHTML='<div class="anecdote"><strong>'+em+' '+(ok?'Bravo !':'Pas tout a fait...')+'</strong><br>'+cur.q.t+'<button class="next-btn" onclick="nextQ()">Suivant →</button></div>';
}

function nextQ(){if(!isImg)qIdx++;isImg=false;showQ();}

function showResults(){
  document.getElementById('quiz-screen').style.display='none';
  var el=document.getElementById('results-screen');el.style.display='block';
  var pct=answered>0?Math.round(score/answered*100):0;
  var em=pct>=80?'🏆':pct>=60?'🌟':pct>=40?'👏':'📚';
  var ti=pct>=80?'Incroyable !':pct>=60?'Tres bien !':pct>=40?'Pas mal !':'Continue !';
  var su=pct>=80?'Expert de '+city:pct>=60?'Bonne connaissance de '+city:'Tu decouvres '+city;

  // Save score
  var scores=JSON.parse(localStorage.getItem('quiz-story-scores')||'{}');
  var prev=scores[city]||{};
  scores[city]={plays:(prev.plays||0)+1,bestPct:Math.max(prev.bestPct||0,pct),lastScore:score,lastTotal:answered};
  localStorage.setItem('quiz-story-scores',JSON.stringify(scores));

  el.innerHTML='<div class="results-card"><div class="emoji">'+em+'</div><div class="title">'+ti+'</div><div class="sub">'+su+'</div><div class="stats-row"><div class="stat"><div class="val" style="color:var(--green)">'+score+'/'+answered+'</div><div class="lbl">Correct</div></div><div class="stat"><div class="val" style="color:var(--orange)">'+maxStrk+'</div><div class="lbl">Serie max</div></div><div class="stat"><div class="val" style="color:'+COLORS[level]+'">'+LABELS[level]+'</div><div class="lbl">Niveau</div></div></div><div class="results-btns"><button onclick="startQuiz(\''+city+'\')">Rejouer ↻</button><button class="sec" onclick="backHome()">← Retour</button></div></div>';
  window.scrollTo({top:0,behavior:'smooth'});
}

function backHome(){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('results-screen').style.display='none';
  document.getElementById('stories-home').style.display='block';
  renderBubbles();
}

function renderBubbles(){
  var raw=localStorage.getItem('quiz-last-top3');
  if(!raw){document.getElementById('empty-state').style.display='block';return;}
  var top3=JSON.parse(raw);
  if(!top3||!top3.length){document.getElementById('empty-state').style.display='block';return;}
  var cities=top3.map(function(r){return r.city;}).filter(function(c){return CQ[c];});
  if(!cities.length){document.getElementById('empty-state').style.display='block';return;}

  var scores=JSON.parse(localStorage.getItem('quiz-story-scores')||'{}');
  var h='';
  cities.forEach(function(c){
    var emoji=CITY_EMOJIS[c]||'🌍';
    var sc=scores[c];
    var ring='story-ring';
    if(sc&&sc.bestPct>=80)ring+=' completed';
    else if(sc)ring+=' played';
    h+='<div class="story-bubble" onclick="startQuiz(\''+c.replace(/'/g,"\\'")+'\')">';
    h+='<div class="'+ring+'"><div class="story-avatar">'+emoji+'</div></div>';
    h+='<div class="story-name">'+c+'</div></div>';
  });
  document.getElementById('bubble-row').innerHTML=h;
  document.getElementById('stories-home').style.display='block';
}

renderBubbles();
</script>
</body>
</html>
